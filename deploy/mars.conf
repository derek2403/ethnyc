# MARS reverse-proxy vhost. Copy to:  ~/nginx-proxy/conf.d/mars.conf
# Then reload:                         docker exec nginx-proxy nginx -s reload
#
# `mars` resolves to the app container over the shared `proxy` Docker network.
# Cloudflare (orange-cloud) terminates HTTPS and forwards to this server on :80.

server {
    listen 80;
    server_name mars.derek2403.win;

    # MARS streams over SSE from the browser (/api/register-agent-stream renders the
    # World QR, then holds the stream open while the human scans). Disable proxy buffering
    # + use a long read timeout so nginx never cuts it. (The app sends a 15s heartbeat so
    # Cloudflare's edge doesn't drop it either.)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 25m;     # skill source / audit-report uploads

    location / {
        proxy_pass              http://mars:3000;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        chunked_transfer_encoding on;
    }
}

# NOTE: nginx resolves `mars` once at startup. If you later rebuild the mars container
# (new IP), reload nginx too:  docker exec nginx-proxy nginx -s reload
